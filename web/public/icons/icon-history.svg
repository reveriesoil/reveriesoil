<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- 历史记录图标：带箭头的圆 + 时钟指针 -->
  <circle cx="24" cy="24" r="20" fill="none" stroke="#7c6cfc" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 返回箭头片段（左上缺口） -->
  <path d="M8 14 A18 18 0 0 0 8 34" fill="none" stroke="#7c6cfc" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="4,10 8,14 13,11" fill="none" stroke="#7c6cfc" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 时钟指针 -->
  <line x1="24" y1="14" x2="24" y2="24" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="31" y2="29" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="24" cy="24" r="2" fill="#c4b5fd"/>
</svg>
